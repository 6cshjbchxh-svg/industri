<!doctype html>
<html lang="no" class="auth-pending">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Industri Tegning</title>
    <link rel="stylesheet" href="../style.css?v=20260311-22" />
    <style>
      html.auth-pending body {
        visibility: hidden;
      }
      .auth-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }
      .auth-card {
        width: min(460px, 100%);
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
        padding: 18px;
        display: grid;
        gap: 12px;
      }
      .auth-card h1 {
        margin: 0;
      }
      .auth-error {
        color: #b91c1c;
        font-weight: 600;
        min-height: 1.4em;
      }
    </style>
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card">
        <h1>Logg inn</h1>
        <p class="subtitle">Kun innloggede brukere har tilgang til tegning.</p>
        <form id="loginForm" class="form-grid">
          <label>
            E-post
            <input id="email" type="email" autocomplete="email" required />
          </label>
          <label>
            Passord
            <input id="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary" type="submit">Logg inn</button>
          <div id="loginError" class="auth-error" role="alert" aria-live="polite"></div>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js?v=20260311-22"></script>
    <script src="../auth-client.js?v=20260311-22"></script>
    <script>
      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('loginError');

      (async () => {
        const reason = window.AppAuth?.getReasonFromQuery?.();
        if (reason) errorEl.textContent = window.AppAuth.getAccessMessage(reason);

        const access = await window.AppAuth?.requireAppAccess?.({ redirect: false });
        document.documentElement.classList.remove('auth-pending');
        if (access?.access) {
          window.AppAuth.redirectAfterLogin();
        }
      })();

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        errorEl.textContent = '';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const { error } = await window.AppAuth.signInWithPassword(email, password);

        if (error) {
          errorEl.textContent = 'Feil e-post eller passord. Prøv igjen.';
          return;
        }

        const access = await window.AppAuth.requireAppAccess({ redirect: false });
        if (!access?.access) {
          errorEl.textContent = window.AppAuth.getAccessMessage(access?.reason || 'profile_missing');
          return;
        }

        window.AppAuth.redirectAfterLogin();
      });
    </script>
  </body>
</html>
