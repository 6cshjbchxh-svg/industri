<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Industri Arbeidstegning Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="panel input-panel">
        <h1>Arbeidstegning Generator</h1>
        <p class="subtitle">Skriv inn mål i mm og få ferdig teknisk tegning.</p>

        <form id="drawing-form" class="form-grid">
          <div class="legacy-fields">
          <label>
            Tegningstype
            <select id="drawingMode">
              <option value="block">Blokk / generell</option>
              <option value="uprofile">U-profil (verksted)</option>
            </select>
          </label>
          <label>
            Emnenavn
            <input id="partName" type="text" value="Del-001" maxlength="40" />
          </label>
          <label>
            Lengde (mm)
            <input id="length" type="number" min="1" step="0.1" value="180" required />
          </label>
          <label>
            Bredde (mm)
            <input id="width" type="number" min="1" step="0.1" value="100" required />
          </label>
          <label>
            Høyde (mm)
            <input id="height" type="number" min="1" step="0.1" value="60" required />
          </label>
          <label>
            Hull-diameter (mm)
            <input id="holeDiameter" type="number" min="0" step="0.1" value="20" />
          </label>
          <label>
            Hull X-posisjon (mm)
            <input id="holeOffsetX" type="number" min="0" step="0.1" value="90" />
          </label>
          <label>
            Hull Y-posisjon (mm)
            <input id="holeOffsetY" type="number" min="0" step="0.1" value="50" />
          </label>
          <label>
            Toleranse
            <input id="tolerance" type="text" value="ISO 2768-m" maxlength="20" />
          </label>
          <section class="uprofile-fields">
            <h2>U-profil mål</h2>
            <label>
              U-Lengde (mm)
              <input id="uLength" type="number" min="1" step="0.1" value="1011" />
            </label>
            <label>
              U-Høyde (mm)
              <input id="uHeight" type="number" min="1" step="0.1" value="35" />
            </label>
            <label>
              U-Innvendig bredde (mm)
              <input id="uInnerWidth" type="number" min="1" step="0.1" value="10" />
            </label>
            <label>
              Godstykkelse (mm)
              <input id="uThickness" type="number" min="0.1" step="0.1" value="2" />
            </label>
            <label>
              Innvendig radius (mm)
              <input id="uRadius" type="number" min="0" step="0.1" value="0.5" />
            </label>
            <label>
              Materiale
              <input id="uMaterial" type="text" value="Aluminium (Alu)" maxlength="30" />
            </label>
          </section>
          <button type="submit" class="primary">Oppdater tegning</button>
          </div>
        </form>

        <div id="status" role="status" aria-live="polite"></div>
        <section class="sketch-dimensions-panel">
          <h2>Skissemål</h2>
          <div id="sketchDimensions" class="sketch-dimensions-empty">Ingen figurer ennå.</div>
        </section>
      </section>

      <section class="panel output-panel">
        <div class="toolbar">
          <div class="preview-controls">
            <button id="uiModeToggle" class="secondary" type="button">Avansert</button>
            <button id="zoomOut" class="secondary" type="button">Zoom -</button>
            <button id="fitView" class="secondary" type="button">Tilpass</button>
            <button id="zoomIn" class="secondary" type="button">Zoom +</button>
            <span id="zoomLabel" class="zoom-label">100%</span>
          </div>
          <div class="draw-controls">
            <label class="inline-control advanced-only">
              Materiale
              <select id="sketchMaterial">
                <option value="stal">Stål</option>
                <option value="alu">Alu</option>
                <option value="blikk">Blikk</option>
              </select>
            </label>
            <label class="inline-control advanced-only">
              Snap
              <select id="snapAngleStep">
                <option value="off">Av</option>
                <option value="15">15°</option>
                <option value="30" selected>30°</option>
                <option value="45">45°</option>
                <option value="90">90°</option>
              </select>
            </label>
            <button id="toolLine" class="secondary tool-btn active" type="button">Strek</button>
            <button id="toolRect" class="secondary tool-btn" type="button">Firkant</button>
            <button id="toolCircle" class="secondary tool-btn" type="button">Sirkel</button>
            <button id="toolPipe" class="secondary tool-btn advanced-only" type="button">Rør</button>
            <button id="toolMove" class="secondary tool-btn" type="button">Flytt</button>
            <button id="toolExtrude" class="secondary tool-btn" type="button">Dra ut 3D</button>
            <button id="toolMeasure" class="secondary tool-btn" type="button">Målelinje</button>
            <button id="undoSketch" class="secondary" type="button">Angre</button>
            <button id="blankSheet" class="secondary action-btn advanced-only" type="button">Blankt ark</button>
            <button id="clearSketch" class="secondary advanced-only" type="button">Slett skisse</button>
            <button id="clearMeasures" class="secondary advanced-only" type="button">Slett mål</button>
            <button id="downloadPdf" class="secondary" type="button">Lag PDF</button>
            <button id="sendEmail" class="secondary advanced-only" type="button">Send på e-post</button>
            <button id="downloadSvg" class="secondary advanced-only" type="button">Last ned SVG</button>
          </div>
        </div>
        <div class="preview-wrap">
          <svg id="drawing" viewBox="0 0 1189 841" xmlns="http://www.w3.org/2000/svg" aria-label="Arbeidstegning"></svg>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
